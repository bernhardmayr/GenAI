<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mal-Atelier 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: linear-gradient(160deg, #1a1a2e, #16213e);
    color: #e8e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 12px 24px;
    gap: 14px;
    min-height: 100vh;
  }
  header { text-align: center; }
  h1 {
    font-size: clamp(24px, 6vw, 40px);
    background: linear-gradient(90deg, #ffd166, #06d6a0, #8ecae6, #ef476f);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 1px;
  }
  header p { opacity: 0.6; font-size: 13px; margin-top: 4px; }
  a.back { position: fixed; top: 12px; left: 14px; color: #8ecae6; text-decoration: none; font-size: 14px; opacity: 0.8; z-index: 5; }
  a.back:hover { opacity: 1; }

  .panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px;
    width: 100%;
    max-width: 1100px;
  }

  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
  .row + .row { margin-top: 10px; }
  .group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .sep { width: 1px; align-self: stretch; background: rgba(255,255,255,0.12); margin: 0 2px; }

  .label { font-size: 12px; opacity: 0.55; margin-right: 2px; }

  /* Colour swatches */
  .swatches { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .swatch {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    cursor: pointer; transition: transform 0.1s ease, border-color 0.1s ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active { border-color: #fff; transform: scale(1.18); box-shadow: 0 0 0 3px rgba(255,255,255,0.18); }

  /* Tool / action buttons */
  button.tool, label.tool {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e8e8f0;
    border-radius: 11px;
    padding: 9px 12px;
    font-size: 14px; cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    user-select: none;
  }
  button.tool:hover, label.tool:hover { background: rgba(255,255,255,0.13); }
  button.tool:active { transform: scale(0.95); }
  button.tool.active { background: rgba(255,209,102,0.22); border-color: rgba(255,209,102,0.6); }
  button.tool.primary { background: rgba(6,214,160,0.18); border-color: rgba(6,214,160,0.5); }
  button.tool.danger:hover { background: rgba(239,71,111,0.2); border-color: rgba(239,71,111,0.5); }

  input[type="color"] {
    width: 38px; height: 34px; border: none; background: none; cursor: pointer; padding: 0; border-radius: 8px;
  }
  input[type="range"] { width: 130px; accent-color: #06d6a0; cursor: pointer; }

  .sizeVal { font-size: 13px; opacity: 0.7; width: 38px; text-align: left; }

  /* Canvas — Höhe über die padding-bottom-Technik erzwingen.
     Der .stage erhält seine Höhe von einem ::before-Pseudo-Element
     (Seitenverhältnis 920/1100 = 83.6364 %); das Canvas füllt ihn
     absolut. Diese Technik hält die Höhe seit jeher zuverlässig auf
     iOS-Safari – unabhängig von der dort unzuverlässigen intrinsischen
     Höhe eines <canvas>-Elements oder von JavaScript-Timing. */
  .stage {
    position: relative;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    overflow: hidden;
    width: 100%;
    max-width: min(1100px, 96vw);
    touch-action: none;
  }
  .stage::before {
    content: "";
    display: block;
    padding-bottom: 83.6364%; /* 920 / 1100 */
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block; cursor: crosshair;
  }

  footer { opacity: 0.4; font-size: 12px; text-align: center; max-width: 600px; }
</style>
</head>
<body>
  <a class="back" href="index.html">← Spiele</a>
  <header>
    <h1>Mal-Atelier</h1>
    <p>Mal frei drauflos mit vielen Farben und Stiften 🎨</p>
  </header>

  <!-- Werkzeugleiste -->
  <div class="panel">
    <div class="row">
      <div class="swatches" id="swatches"></div>
      <div class="sep"></div>
      <label class="tool" title="Eigene Farbe wählen">
        🎨 <input type="color" id="customColor" value="#ff5da2">
      </label>
    </div>

    <div class="row">
      <div class="group">
        <span class="label">Werkzeug</span>
        <button class="tool active" data-tool="brush" title="Pinsel (weich)">🖌️ Pinsel</button>
        <button class="tool" data-tool="pencil" title="Buntstift (hart)">✏️ Stift</button>
        <button class="tool" data-tool="marker" title="Filzstift (kräftig)">🖊️ Filzer</button>
        <button class="tool" data-tool="crayon" title="Wachsmalstift (körnig)">🖍️ Wachs</button>
        <button class="tool" data-tool="spray" title="Sprühdose">💨 Spray</button>
        <button class="tool" data-tool="fill" title="Flächen füllen">🪣 Füllen</button>
        <button class="tool" data-tool="rainbow" title="Regenbogen-Pinsel">🌈 Regenbogen</button>
        <button class="tool" data-tool="eraser" title="Radiergummi">🧽 Radierer</button>
      </div>
    </div>

    <div class="row">
      <div class="group">
        <span class="label">Größe</span>
        <input type="range" id="size" min="1" max="60" value="10">
        <span class="sizeVal" id="sizeVal">10 px</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button class="tool" id="undo" title="Rückgängig">↩️ Zurück</button>
        <button class="tool danger" id="clear" title="Alles löschen">🗑️ Leeren</button>
        <button class="tool primary" id="save" title="Als Bild speichern">💾 Speichern</button>
      </div>
    </div>
  </div>

  <!-- Leinwand -->
  <div class="stage">
    <canvas id="canvas" width="1100" height="920"></canvas>
  </div>

  <footer>Tipp: Mit dem 🪣 <b>Füllen</b>-Werkzeug malst du ganze Flächen mit einem Klick aus. Funktioniert mit Maus und Finger.</footer>

<script>
"use strict";
(function () {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const W = canvas.width, H = canvas.height;

  // ---------- Zustand ----------
  const state = {
    tool: "brush",
    color: "#ff5da2",
    size: 10,
    hue: 0,          // für Regenbogen
    drawing: false,
    last: null,
  };

  const undoStack = [];
  const MAX_UNDO = 25;

  function pushUndo() {
    try {
      undoStack.push(ctx.getImageData(0, 0, W, H));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
    } catch (e) { /* ignore */ }
  }

  // ---------- Hintergrund / Leinwand füllen ----------
  function fillWhite() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, W, H);
  }
  fillWhite();

  // ---------- Farbpalette ----------
  const palette = [
    "#000000", "#6d4c41", "#ef476f", "#ff5da2", "#ff8c42", "#ffd166",
    "#fff35c", "#a8e063", "#06d6a0", "#118ab2", "#8ecae6", "#3a86ff",
    "#7b2cbf", "#c77dff", "#f4978e", "#ffffff"
  ];
  const swatchEls = [];
  const swatchWrap = document.getElementById("swatches");
  palette.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = "swatch" + (i === 3 ? " active" : "");
    el.style.background = c;
    el.title = c;
    el.addEventListener("click", () => selectColor(c, el));
    swatchWrap.appendChild(el);
    swatchEls.push(el);
  });

  function selectColor(c, el) {
    state.color = c;
    swatchEls.forEach(s => s.classList.remove("active"));
    if (el) el.classList.add("active");
    document.getElementById("customColor").value = toHex(c);
    // Beim Farbwählen sinnvoll: weg vom Radierer
    if (state.tool === "eraser") setTool("brush");
  }

  function toHex(c) {
    if (c[0] === "#" && c.length === 7) return c;
    return "#000000";
  }

  document.getElementById("customColor").addEventListener("input", (e) => {
    selectColor(e.target.value, null);
  });

  // ---------- Werkzeuge ----------
  const toolBtns = Array.from(document.querySelectorAll("button.tool[data-tool]"));
  function setTool(name) {
    state.tool = name;
    toolBtns.forEach(b => b.classList.toggle("active", b.dataset.tool === name));
    canvas.style.cursor = (name === "fill") ? "cell" : "crosshair";
  }
  toolBtns.forEach(b => b.addEventListener("click", () => setTool(b.dataset.tool)));

  const sizeEl = document.getElementById("size");
  const sizeVal = document.getElementById("sizeVal");
  sizeEl.addEventListener("input", () => {
    state.size = parseInt(sizeEl.value, 10);
    sizeVal.textContent = state.size + " px";
  });

  // ---------- Koordinaten ----------
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const p = (e.touches && e.touches[0]) ? e.touches[0] : e;
    return {
      x: (p.clientX - r.left) * (W / r.width),
      y: (p.clientY - r.top) * (H / r.height),
    };
  }

  // ---------- Zeichnen ----------
  function strokeStyleFor() {
    if (state.tool === "rainbow") {
      state.hue = (state.hue + 6) % 360;
      return "hsl(" + state.hue + ", 90%, 55%)";
    }
    if (state.tool === "eraser") return "#ffffff";
    return state.color;
  }

  function drawSegment(a, b) {
    const tool = state.tool;

    if (tool === "spray") {
      sprayDots(b);
      return;
    }

    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    if (tool === "pencil") {
      ctx.globalAlpha = 1;
      ctx.lineWidth = Math.max(1, state.size * 0.45);
      ctx.strokeStyle = strokeStyleFor();
    } else if (tool === "marker") {
      ctx.globalAlpha = 0.85;
      ctx.lineWidth = state.size;
      ctx.strokeStyle = strokeStyleFor();
    } else if (tool === "crayon") {
      drawCrayon(a, b);
      return;
    } else if (tool === "rainbow") {
      ctx.globalAlpha = 1;
      ctx.lineWidth = state.size;
      ctx.strokeStyle = strokeStyleFor();
    } else if (tool === "eraser") {
      ctx.globalAlpha = 1;
      ctx.lineWidth = state.size * 1.4;
      ctx.strokeStyle = "#ffffff";
    } else { // brush
      ctx.globalAlpha = 1;
      ctx.lineWidth = state.size;
      ctx.strokeStyle = strokeStyleFor();
    }

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function sprayDots(p) {
    const density = Math.max(8, state.size * 1.4);
    const radius = state.size;
    ctx.fillStyle = strokeStyleFor();
    ctx.globalAlpha = 0.8;
    for (let i = 0; i < density; i++) {
      const ang = Math.random() * Math.PI * 2;
      const rr = Math.random() * radius;
      const dx = Math.cos(ang) * rr;
      const dy = Math.sin(ang) * rr;
      ctx.beginPath();
      ctx.arc(p.x + dx, p.y + dy, 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCrayon(a, b) {
    const steps = Math.max(1, Math.hypot(b.x - a.x, b.y - a.y) / 2);
    ctx.fillStyle = strokeStyleFor();
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const x = a.x + (b.x - a.x) * t;
      const y = a.y + (b.y - a.y) * t;
      const n = Math.max(3, state.size * 0.8);
      for (let i = 0; i < n; i++) {
        const ang = Math.random() * Math.PI * 2;
        const rr = Math.random() * state.size * 0.5;
        ctx.globalAlpha = 0.25 + Math.random() * 0.35;
        ctx.beginPath();
        ctx.arc(x + Math.cos(ang) * rr, y + Math.sin(ang) * rr, state.size * 0.12 + 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // ---------- Eimer / Flood Fill ----------
  function hexToRgb(c) {
    if (c[0] === "#") {
      return [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
    }
    // hsl() für Regenbogen → über temporären Canvas
    const t = document.createElement("canvas"); t.width = t.height = 1;
    const tc = t.getContext("2d"); tc.fillStyle = c; tc.fillRect(0,0,1,1);
    const d = tc.getImageData(0,0,1,1).data;
    return [d[0], d[1], d[2]];
  }

  function floodFill(sx, sy, fillColor) {
    sx = Math.round(sx); sy = Math.round(sy);
    if (sx < 0 || sy < 0 || sx >= W || sy >= H) return;
    const img = ctx.getImageData(0, 0, W, H);
    const data = img.data;
    const idx = (sy * W + sx) * 4;
    const sr = data[idx], sg = data[idx+1], sb = data[idx+2], sa = data[idx+3];
    const [fr, fg, fb] = fillColor;

    // Schon die Zielfarbe? Nichts tun.
    if (Math.abs(sr-fr) < 4 && Math.abs(sg-fg) < 4 && Math.abs(sb-fb) < 4 && sa === 255) return;

    const tol = 48; // Toleranz, damit weiche Pinselränder/Outlines respektiert werden
    const match = (i) => {
      const dr = data[i]-sr, dg = data[i+1]-sg, db = data[i+2]-sb, da = data[i+3]-sa;
      return (dr*dr + dg*dg + db*db + da*da) <= tol*tol;
    };

    const stack = [[sx, sy]];
    while (stack.length) {
      const [x, y] = stack.pop();
      let nx = x;
      // nach links wandern
      while (nx >= 0 && match((y*W + nx)*4)) nx--;
      nx++;
      let up = false, down = false;
      while (nx < W && match((y*W + nx)*4)) {
        const i = (y*W + nx)*4;
        data[i] = fr; data[i+1] = fg; data[i+2] = fb; data[i+3] = 255;
        if (y > 0) {
          const ai = ((y-1)*W + nx)*4;
          if (match(ai)) { if (!up) { stack.push([nx, y-1]); up = true; } }
          else up = false;
        }
        if (y < H-1) {
          const bi = ((y+1)*W + nx)*4;
          if (match(bi)) { if (!down) { stack.push([nx, y+1]); down = true; } }
          else down = false;
        }
        nx++;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  // ---------- Pointer-Handling ----------
  function start(e) {
    e.preventDefault();
    const p = pos(e);
    if (state.tool === "fill") {
      pushUndo();
      floodFill(p.x, p.y, hexToRgb(strokeStyleFor()));
      return;
    }
    pushUndo();
    state.drawing = true;
    state.last = p;
    // Punkt setzen (für Klick ohne Bewegung)
    drawSegment(p, { x: p.x + 0.01, y: p.y + 0.01 });
  }
  function move(e) {
    if (!state.drawing) return;
    e.preventDefault();
    const p = pos(e);
    drawSegment(state.last, p);
    state.last = p;
  }
  function end() {
    state.drawing = false;
    state.last = null;
  }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);
  canvas.addEventListener("touchcancel", end);

  // ---------- Aktionen ----------
  document.getElementById("undo").addEventListener("click", () => {
    if (!undoStack.length) return;
    ctx.putImageData(undoStack.pop(), 0, 0);
  });
  document.getElementById("clear").addEventListener("click", () => {
    pushUndo();
    fillWhite();
  });
  document.getElementById("save").addEventListener("click", () => {
    const a = document.createElement("a");
    a.download = "mein-bild.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });

  // Tastatur-Komfort
  window.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z") {
      e.preventDefault();
      if (undoStack.length) ctx.putImageData(undoStack.pop(), 0, 0);
    }
  });
})();
</script>
</body>
</html>
